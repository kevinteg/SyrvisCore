[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "syrviscore-mcp"
version = "0.1.0"
description = "MCP server exposing SyrvisCore NAS operations as tools over SSH (operator-side, Mac)"
readme = "README.md"
authors = [{ name = "Kevin Tegtmeier" }]
license = { text = "MIT" }
# Runs on the operator's Mac, NOT the NAS — free of the DSM 3.8 constraint.
requires-python = ">=3.10"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: System Administrators",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    # Tested range. The server uses `@mcp.tool(annotations=...)`, which fastmcp
    # 2.2.0 rejects, and the `FastMCP` import surface moved across the 2->3
    # boundary; a clean install resolves to (and is verified against) 3.x. An
    # unbounded floor let a co-resolver select a broken 2.x, so pin the major.
    "fastmcp>=3.0,<4",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pyyaml>=6.0",
    "black>=23.0.0",
    "ruff>=0.1.0",
]

[project.scripts]
syrviscore-mcp = "syrviscore_mcp.__main__:main"

[project.urls]
Homepage = "https://github.com/kevinteg/SyrvisCore"

[tool.setuptools.packages.find]
where = ["src"]

[tool.black]
line-length = 100
target-version = ["py310"]

[tool.ruff]
line-length = 100
target-version = "py310"
