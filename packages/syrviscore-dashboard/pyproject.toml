[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "syrviscore-dashboard"
version = "0.1.3"
description = "SyrvisCore Dashboard - live web observability + safe management for a SyrvisCore instance"
readme = "README.md"
authors = [{ name = "Kevin Tegtmeier" }]
license = { text = "MIT" }
# Runs on the NAS as a container with its own Python — free of the DSM 3.8 constraint.
# It imports the `syrviscore` library (3.8+) in-process, which is forward-compatible here.
requires-python = ">=3.10"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: System Administrators",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "httpx>=0.27",
    "pydantic>=2.6",
    "pydantic-settings>=2.2",
    "sse-starlette>=2.0",
    "pyjwt[crypto]>=2.8",
    "authlib>=1.3",
    "itsdangerous>=2.1",
    "docker>=7.0",
    "syrviscore",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.23",
    "respx>=0.21",
    "black>=23.0.0",
    "ruff>=0.1.0",
]

[project.scripts]
syrviscore-dashboard = "syrviscore_dashboard.__main__:main"

[project.urls]
Homepage = "https://github.com/kevinteg/SyrvisCore"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
syrviscore_dashboard = ["static/**/*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.black]
line-length = 100
target-version = ["py310"]

[tool.ruff]
line-length = 100
target-version = "py310"
