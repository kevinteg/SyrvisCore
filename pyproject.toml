# Repo-level tool configuration only.
# The installable packages live in packages/syrviscore-manager and
# packages/syrviscore, each with its own pyproject.toml.

[tool.black]
line-length = 100
target-version = ["py38"]

[tool.ruff]
line-length = 100
target-version = "py38"

[tool.pytest.ini_options]
testpaths = ["tests"]
