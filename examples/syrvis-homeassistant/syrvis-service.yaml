# Home Assistant Service for SyrvisCore
# Open source home automation platform

name: homeassistant
version: "1.0.0"
description: "Open source home automation"
author: "SyrvisCore"
homepage: "https://www.home-assistant.io/"

# Docker image - pin a specific version (floating tags like :latest are rejected)
image: ghcr.io/home-assistant/home-assistant:2024.12.5
container_name: homeassistant

# Traefik routing
traefik:
  enabled: true
  subdomain: ha
  port: 8123
  # LAN-only: reach https://ha.<domain> from inside the network. Change to
  # 'tunnel' to expose it remotely through the Cloudflare Tunnel + Access.
  exposure: internal

# Restart policy
restart: unless-stopped

# Volume mounts
# Host paths must be relative (resolved under $SYRVIS_HOME/data/homeassistant/).
# Absolute host bind mounts (e.g. /etc/localtime) are rejected by the service
# schema; the TZ env var below sets the timezone instead.
volumes:
  - "config:/config:rw"

# Environment variables
environment:
  - "TZ=America/Chicago"

# Networks
networks:
  - proxy
