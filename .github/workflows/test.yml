name: Test

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    # ubuntu-22.04 pinned: Python 3.8 (the DSM runtime) is unavailable on newer runners
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.8"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/syrviscore-manager[dev]"
          pip install -e "packages/syrviscore[dev]"

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --tb=short

      - name: Check code formatting with Black
        run: |
          black --check packages/syrviscore-manager/src packages/syrviscore/src tests

      - name: Lint with Ruff
        run: |
          ruff check packages/syrviscore-manager/src packages/syrviscore/src tests

  # The MCP server runs on the operator's Mac (not the NAS), so it targets a
  # modern Python and is tested on its own — never in the 3.8 SPK matrix.
  mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install the MCP package
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/syrviscore-mcp[dev]"

      - name: Run MCP tests (offline; includes visudo + shim checks)
        run: |
          pytest packages/syrviscore-mcp/tests -v --tb=short

      - name: Lint + format
        run: |
          black --check packages/syrviscore-mcp/src packages/syrviscore-mcp/tests
          ruff check packages/syrviscore-mcp/src packages/syrviscore-mcp/tests

      - name: Generated deploy artifacts are in sync
        run: |
          python -m syrviscore_mcp.deploy.gen check packages/syrviscore-mcp/deploy

  # The dashboard runs on the NAS as a container (its own Python 3.12) and imports
  # the syrviscore library in-process — tested on a modern Python, not the 3.8 matrix.
  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: packages/syrviscore-dashboard/frontend/package-lock.json

      - name: Install the dashboard (+ the service library it imports)
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/syrviscore" -e "packages/syrviscore-dashboard[dev]"

      - name: Run dashboard tests
        run: |
          pytest packages/syrviscore-dashboard/tests -v --tb=short

      - name: Lint + format
        run: |
          black --check packages/syrviscore-dashboard/src packages/syrviscore-dashboard/tests
          ruff check packages/syrviscore-dashboard/src packages/syrviscore-dashboard/tests

      - name: Frontend typecheck + build
        working-directory: packages/syrviscore-dashboard/frontend
        run: |
          npm ci
          npm run build

  # Build the dashboard image (push to GHCR only on tags).
  dashboard-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Read dashboard version
        id: ver
        run: |
          echo "version=$(grep '^__version__' \
            packages/syrviscore-dashboard/src/syrviscore_dashboard/__version__.py \
            | cut -d'"' -f2)" >> "$GITHUB_OUTPUT"

      # Publish to GHCR on merge-to-main, a v* tag, or a manual run; otherwise just build.
      - name: Should publish?
        id: publish
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ] \
             || [ "${{ startsWith(github.ref, 'refs/tags/') }}" = "true" ] \
             || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        if: steps.publish.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and publish when appropriate)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/syrviscore-dashboard/Dockerfile
          push: ${{ steps.publish.outputs.push == 'true' }}
          tags: |
            ghcr.io/kevinteg/syrviscore-dashboard:${{ steps.ver.outputs.version }}
            ghcr.io/kevinteg/syrviscore-dashboard:latest

  # End-to-end dev loop: build the devkit tarball, then bootstrap a complete
  # install from it (real venvs, real pip, offline manager install) — the same
  # flow used against the NAS via `make nas-dev`.
  dev-loop:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"
          cache: 'pip'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build devkit tarball
        run: |
          chmod +x build-tools/*.sh
          ./build-tools/build-tarball.sh

      - name: Bootstrap from the tarball
        run: |
          mkdir -p "$RUNNER_TEMP/devkit"
          tar xzf dist/syrviscore-devkit-*.tar.gz --strip-components=1 -C "$RUNNER_TEMP/devkit"
          cd "$RUNNER_TEMP/devkit"
          ./bootstrap.sh --home "$RUNNER_TEMP/syrvis-dev-home" --yes

      - name: Verify the bootstrapped install
        run: |
          test -L "$RUNNER_TEMP/syrvis-dev-home/current"
          "$RUNNER_TEMP/syrvis-dev-home/current/cli/venv/bin/syrvis" --version
          SYRVIS_HOME="$RUNNER_TEMP/syrvis-dev-home" \
            "$RUNNER_TEMP/devkit/manager-venv/bin/syrvisctl" list --json

      - name: Tear down with --clean
        run: |
          cd "$RUNNER_TEMP/devkit"
          ./bootstrap.sh --home "$RUNNER_TEMP/syrvis-dev-home" --clean
          test ! -d "$RUNNER_TEMP/syrvis-dev-home"
