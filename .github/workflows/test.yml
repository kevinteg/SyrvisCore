name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    # ubuntu-22.04 pinned: Python 3.8 (the DSM runtime) is unavailable on newer runners
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.8"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/syrviscore-manager[dev]"
          pip install -e "packages/syrviscore[dev]"

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --tb=short

      - name: Check code formatting with Black
        run: |
          black --check packages/syrviscore-manager/src packages/syrviscore/src tests

      - name: Lint with Ruff
        run: |
          ruff check packages/syrviscore-manager/src packages/syrviscore/src tests
